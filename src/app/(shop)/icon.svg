<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo -->
  <rect width="100" height="100" rx="22" fill="#111111"/>

  <!-- Borde sutil -->
  <rect x="3" y="3" width="94" height="94" rx="20" fill="none" stroke="#C9A227" stroke-width="2"/>

  <!-- Letra D estilizada -->
  <path 
    d="M30 20 
       L50 20 
       C75 20, 80 40, 80 50 
       C80 60, 75 80, 50 80 
       L30 80 Z"
    fill="#C9A227"
  />

  <!-- Corte interno para darle estilo -->
  <path 
    d="M42 32 
       L50 32 
       C65 32, 68 42, 68 50 
       C68 58, 65 68, 50 68 
       L42 68 Z"
    fill="#111111"
  />

  <!-- Detalle tipo línea deportiva -->
  <rect x="28" y="48" width="44" height="4" fill="#ffffff" opacity="0.15"/>
</svg>